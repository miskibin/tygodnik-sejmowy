# Build the self-host frontend image on every `v*` tag and push to GHCR.
# Image: ghcr.io/miskibin/tygodnik-sejmowy-frontend:<tag> + :latest
#
# Pulling on mixvm: deploy/mixvm/docker-compose.frontend.prod.yml uses the
# `image:` key (no build context) so Portainer just pulls + restarts.
#
# Required repo secrets:
#   - SUPABASE_URL   — baked into Next prerender (rss.xml, /alerty hit DB)
#   - SUPABASE_KEY   — same
# GITHUB_TOKEN is auto-provided and has `packages: write` via the job perm
# block below.

name: Frontend image

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (defaults to git ref)'
        required: false

jobs:
  build-push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/miskibin/tygodnik-sejmowy-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # BuildKit secrets — same mechanism the local Dockerfile uses.
          # Passed via stdin so values never appear in process listings or logs.
          secrets: |
            supabase_url=${{ secrets.SUPABASE_URL }}
            supabase_key=${{ secrets.SUPABASE_KEY }}
          # GHA cache keeps subsequent builds fast (~1 min vs ~4 min cold).
          cache-from: type=gha
          cache-to: type=gha,mode=max

# Frontend self-host on mixvm. Deployed via Portainer Stack-from-Git pointing
# at this file. Image is built by the GitHub Actions workflow on every v* tag
# (see .github/workflows/frontend-image.yml) and pulled from GHCR — nothing
# is built on the VM. Recreate = ~30 s pull instead of ~4 min build.
#
# Portainer env vars (set in the stack):
#   - SUPABASE_URL          — required, baked into Next prerender at build
#   - SUPABASE_KEY          — required, anon key (RLS-respecting)
#   - FRONTEND_IMAGE_TAG    — image tag to pull (e.g. v0.10.2); defaults to
#                             :latest, which the workflow re-points on every
#                             v* tag publish
#   - OLLAMA_BASE_URL       — optional, defaults to internal compose alias
#   - PATRONITE_TOKEN       — optional
#
# Port 3001 chosen because 3000 is reserved for any future Next dev session
# and 80/443 are owned by something else on the host. Cloudflare Tunnel
# (sejmograf-cloudflared stack) routes vm.tygodniksejmowy.pl → :3001.

name: sejmograf-frontend

services:
  frontend:
    image: ghcr.io/miskibin/tygodnik-sejmowy-frontend:${FRONTEND_IMAGE_TAG:-latest}
    container_name: sejmograf-frontend
    restart: unless-stopped
    pull_policy: always
    ports:
      - "3001:3000"
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://sejmograf-ollama:11434}
      PATRONITE_TOKEN: ${PATRONITE_TOKEN:-}
      NODE_ENV: production
    mem_limit: 1g
    cpus: 1.0
    networks:
      - default
      # Join supabase_default so SSR can hit Kong over the internal bridge
      # (~10× faster than going out → Cloudflare → back in).
      - supabase

networks:
  default:
  supabase:
    external: true
    name: supabase_default
